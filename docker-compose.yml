services:
  api:
    build:
      context: .
      dockerfile: src/PodPilot.Api/Dockerfile
    container_name: podpilot-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal;Port=3306;Database=podpilot;User=podpilot;Password=podpilot_secret;"
      Jwt__Secret: "PodPilot_Docker_Super_Secret_Key_For_JWT_Token_Generation_2026!"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:5173"
      Cors__AllowedOrigins__2: "http://localhost"
      Swagger__Enabled: "true"
    ports:
      - "5000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - podpilot-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: podpilot-web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - podpilot-network

networks:
  podpilot-network:
    driver: bridge
