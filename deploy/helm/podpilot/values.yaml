replicaCount:
  api: 1
  web: 1

image:
  api:
    repository: ghcr.io/podpilot/api
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/podpilot/web
    tag: latest
    pullPolicy: IfNotPresent

service:
  api:
    type: ClusterIP
    port: 8080
  web:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: podpilot.local
      paths:
        - path: /api
          service: api
          port: 8080
        - path: /
          service: web
          port: 80

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Swagger__Enabled: "false"

# Provide secrets via --set or an external Secret (do not commit real values).
secrets:
  # ConnectionStrings__DefaultConnection
  mysqlConnection: ""
  # ConnectionStrings__Redis (defaults to in-cluster redis service when empty)
  redisConnection: ""
  # Jwt__Secret
  jwtSecret: ""

resources:
  api:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  web:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
