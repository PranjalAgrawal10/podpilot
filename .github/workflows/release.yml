name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build PodPilot.slnx --configuration Release

      - name: Log in to GHCR
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image (placeholder registry path)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/podpilot-api:${{ steps.version.outputs.tag }}"
          docker build -f src/PodPilot.Api/Dockerfile -t "$IMAGE" .
          echo "Built $IMAGE"
          # Uncomment when ready to publish:
          # docker push "$IMAGE"

      - name: Build and push web image (placeholder registry path)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/podpilot-web:${{ steps.version.outputs.tag }}"
          docker build -f web/Dockerfile -t "$IMAGE" ./web
          echo "Built $IMAGE"
          # Uncomment when ready to publish:
          # docker push "$IMAGE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            PodPilot ${{ steps.version.outputs.tag }}

            Container images (push when registry is configured):
            - `ghcr.io/<owner>/podpilot-api:${{ steps.version.outputs.tag }}`
            - `ghcr.io/<owner>/podpilot-web:${{ steps.version.outputs.tag }}`
